<div class="auth-layout">

  <header class="auth-header">
    <div class="auth-header-inner">
      <a routerLink="/" class="auth-logo-link">
        <img src="assets/images/logo-julie-bela.png"
             alt="Julie e Bela"
             class="auth-logo-img" />
        <div class="auth-logo-texto">
          <span class="auth-logo-titulo">Julie &amp; Bela</span>
          <span class="auth-logo-subtitulo">Ateliê de Pijamas Infantis</span>
        </div>
      </a>

      <div class="auth-header-acoes">
        <button class="auth-acao-btn" type="button" [routerLink]="['/carrinho']">
          <mat-icon>shopping_cart</mat-icon>
        </button>
        <a class="auth-voltar-loja" routerLink="/">
          <mat-icon>storefront</mat-icon>
          <span>Voltar à loja</span>
        </a>
      </div>
    </div>
    <div class="auth-header-linha"></div>
  </header>

  <main class="auth-main">
    <router-outlet />
  </main>

  <footer class="auth-footer">
    <p>© 2025 Julie &amp; Bela Ateliê. Todos os direitos reservados.</p>
  </footer>

</div>
