<section class="page">

  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a class="bc-link" routerLink="/adm/dashboard">Home</a>
    <mat-icon class="bc-sep">chevron_right</mat-icon>
    <span class="bc-current">Cores</span>
  </nav>

  <div class="page-header">
    <div>
      <h1 class="page-title display">Controle de Cores</h1>
      <p class="page-subtitle">Gerencie as cores disponíveis para os pijamas.</p>
    </div>
    <button matButton="filled" routerLink="/adm/cores/new" aria-label="Adicionar cor">
      <mat-icon>add</mat-icon>
      Nova Cor
    </button>
  </div>

  <div class="filter-bar">
    <div class="filter-search">
      <mat-icon>search</mat-icon>
      <input (keyup)="applyFilter($event)" placeholder="Buscar cor por nome..." #input>
    </div>
    <button class="filter-icon-btn" type="button" aria-label="Filtros">
      <mat-icon>filter_list</mat-icon>
    </button>
  </div>

  <div class="list-card">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let obj; let i = index">{{ i + 1 }}</td>
      </ng-container>
      <ng-container matColumnDef="preview">
        <th mat-header-cell *matHeaderCellDef>Cor</th>
        <td mat-cell *matCellDef="let obj">
          <span class="cor-preview" [style.background]="obj.hexadecimal"></span>
        </td>
      </ng-container>
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let obj">{{ obj.nome }}</td>
      </ng-container>
      <ng-container matColumnDef="hexadecimal">
        <th mat-header-cell *matHeaderCellDef>Hexadecimal</th>
        <td mat-cell *matCellDef="let obj"><code>{{ obj.hexadecimal }}</code></td>
      </ng-container>
      <ng-container matColumnDef="acao">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let obj">
          <button class="action-edit" [routerLink]="['/adm/cores/edit', obj.id]" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button class="action-delete" (click)="excluir(obj.id)" aria-label="Excluir">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">Nenhuma cor encontrada.</td>
      </tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" [pageSize]="10" showFirstLastButtons />
  </div>

</section>
