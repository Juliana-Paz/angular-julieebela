<mat-toolbar class="adm-header">
  <div class="adm-breadcrumb">
    <span class="adm-breadcrumb-root">ADM</span>
    <mat-icon class="adm-breadcrumb-sep">chevron_right</mat-icon>
    <span class="adm-breadcrumb-current">{{ breadcrumb() }}</span>
  </div>

  <div class="adm-header-actions">
    <button mat-icon-button aria-label="Notificações" class="action-btn">
      <mat-icon>notifications_none</mat-icon>
    </button>
    <button mat-icon-button aria-label="Configurações" class="action-btn">
      <mat-icon>settings</mat-icon>
    </button>
  </div>
</mat-toolbar>
