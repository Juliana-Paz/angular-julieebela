<section class="page">

  <!-- Breadcrumb -->
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a class="bc-link" routerLink="/dashboard">Home</a>
    <mat-icon class="bc-sep">chevron_right</mat-icon>
    <span class="bc-current">Municípios</span>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title display">Controle de Municípios</h1>
      <p class="page-subtitle">Monitore e atualize os municípios por estado.</p>
    </div>
    <button matButton="filled" routerLink="/municipios/new" aria-label="Adicionar município">
      <mat-icon>add</mat-icon>
      Novo Município
    </button>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-search">
      <mat-icon>search</mat-icon>
      <input (keyup)="applyFilter($event)" placeholder="Buscar município por nome ou estado..." #input>
    </div>
    <button class="filter-icon-btn" type="button" aria-label="Filtros">
      <mat-icon>filter_list</mat-icon>
    </button>
  </div>

  <!-- Table Card -->
  <div class="list-card">
    <table mat-table [dataSource]="dataSource">
  
      <!-- Numero Column -->
      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let obj; let i = index">{{ i + 1 }}</td>
      </ng-container>

      <!-- Nome Column -->
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let obj">{{ obj.nome }}</td>
      </ng-container>

      <!-- Estado Column -->
      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let obj">{{ obj.estado?.nome }}</td>
      </ng-container>

      <!-- Acao Column -->
      <ng-container matColumnDef="acao">
        <th mat-header-cell *matHeaderCellDef>Ações</th>
        <td mat-cell *matCellDef="let obj">
          <button class="action-edit" [routerLink]="['/municipios/edit', obj.id]" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button class="action-delete" aria-label="Excluir">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator
      class="municipio-paginator"
      [pageSizeOptions]="[2,4,8,16]"
      [pageSize]="pageSize"
      [length]="totalRecords"
      (page)="paginar($event)">
    </mat-paginator>
  </div>
</section>
