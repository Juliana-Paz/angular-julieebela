<div class="auth-card">
  <div class="auth-logo">Julie <span>&</span> Bela</div>
  <div class="auth-tag">Loja Online</div>
  <div class="rainbow-divider"></div>

  <div class="step-indicator">
    <div class="step-dot" [class.active]="passo === 1"></div>
    <div class="step-dot" [class.active]="passo === 2"></div>
    <div class="step-dot" [class.active]="passo === 3"></div>
  </div>

  @if (erro) {
    <div class="error-msg">
      <mat-icon style="font-size:14px;width:14px;height:14px;">error</mat-icon>
      {{ erro }}
    </div>
  }

  <!-- Passo 1: sempre no DOM, visível apenas quando passo===1 -->
  <div [hidden]="passo !== 1">
    <div class="auth-title">Recuperar senha</div>
    <div class="auth-sub">Informe seu e-mail. Enviaremos um código de verificação.</div>
    <div class="field">
      <label>E-mail</label>
      <input #emailInput
             type="email"
             placeholder="seu@email.com"
             autocomplete="email"
             (input)="onEmailInput($event)">
    </div>
    <button class="btn-auth-primary"
            (click)="solicitarCodigo()"
            [disabled]="carregando">
      {{ carregando ? 'Enviando...' : 'Enviar código' }}
    </button>
    <div class="auth-link">
      <a routerLink="/login">← Voltar ao login</a>
    </div>
  </div>

  <!-- Passo 2: sempre no DOM, visível apenas quando passo===2 -->
  <div [hidden]="passo !== 2">
    <div class="auth-title">Verificar código</div>
    <div class="auth-sub">
      Digite o código enviado para <strong>{{ emailExibicao }}</strong>
    </div>
    <div class="field">
      <label>Código</label>
      <input #codigoInput
             type="text"
             placeholder="000000"
             maxlength="6"
             autocomplete="off">
    </div>
    <button class="btn-auth-primary"
            (click)="verificarCodigo()"
            [disabled]="carregando">
      {{ carregando ? 'Verificando...' : 'Verificar' }}
    </button>
  </div>

  <!-- Passo 3: sempre no DOM, visível apenas quando passo===3 -->
  <div [hidden]="passo !== 3">
    <div class="auth-title">Nova senha</div>
    <div class="auth-sub">Escolha uma senha segura para sua conta.</div>
    <div class="field">
      <label>Nova senha</label>
      <input #novaSenhaInput
             type="password"
             placeholder="Mínimo 6 caracteres"
             autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input #confirmarSenhaInput
             type="password"
             placeholder="Repita a senha"
             autocomplete="new-password">
    </div>
    <button class="btn-auth-primary"
            (click)="redefinirSenha()"
            [disabled]="carregando">
      {{ carregando ? 'Salvando...' : 'Salvar nova senha' }}
    </button>
  </div>
</div>
