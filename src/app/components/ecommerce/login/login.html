<div class="auth-card">
  <p class="auth-logo">Julie <span>&amp;</span> Bela</p>
  <p class="auth-tag">Loja Online</p>
  <p class="auth-title">Entrar na conta</p>
  <p class="auth-sub">Bem-vindo(a) de volta! Acesse sua conta para continuar.</p>
  <div class="rainbow-divider"></div>

  <form [formGroup]="form" (ngSubmit)="enviar()">

    @if (erro()) {
      <div class="error-msg">
        <mat-icon>error_outline</mat-icon>
        {{ erro() }}
      </div>
    }

    <div class="field">
      <label>Usuário</label>
      <input type="text" formControlName="login" autocomplete="username" placeholder="Seu nome de usuário" />
    </div>

    <div class="field">
      <label>Senha</label>
      <div class="pw-wrap">
        <input [type]="hideSenha ? 'password' : 'text'" formControlName="senha"
          autocomplete="current-password" placeholder="Sua senha" />
        <button type="button" class="toggle-pw" (click)="hideSenha = !hideSenha">
          <mat-icon>{{ hideSenha ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>

    <a routerLink="/recuperar-senha" class="forgot-link">Esqueceu a senha?</a>

    <button class="btn-auth-primary" type="submit" [disabled]="enviando()">
      {{ enviando() ? 'Entrando...' : 'Entrar' }}
    </button>

  </form>

  <p class="auth-link">Ainda não tem conta? <a routerLink="/cadastro">Criar conta</a></p>
  <p class="auth-link"><a routerLink="/">← Voltar para a loja</a></p>
</div>
